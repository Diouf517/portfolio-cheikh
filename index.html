<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accueil - Portfolio Cheikh</title>
  <link rel="stylesheet" href="style.css">
</head>
<body id="home-page">
  <!-- Menu de navigation -->
  <nav>
    <!-- Bouton hamburger -->
    <div class="burger" id="menu-toggle">
      <span></span>
      <span></span>
      <span></span>
    </div>

    <div class="nav-container">
      <ul class="nav-links" id="menu">
        <li><a href="index.html" class="active">Accueil</a></li>
        <li><a href="about/index.html">À propos</a></li>
        <li><a href="skills/index.html">Compétences</a></li>
        <li><a href="projects/index.html">Projets</a></li>
        <li><a href="contact/index.html">Contact</a></li>
      </ul>
    </div>
  </nav>

  <!-- Section d’accueil -->
  <header class="hero">
    <img src="assets/monavatar.png" alt="Avatar Cheikh" class="avatar">
    <h1>Je suis Cheikh</h1>
    <h2>Créateur digital & développeur web</h2>
    <p>Spécialiste en communication digitale, design et automatisation, je transforme les idées en projets concrets.</p>
    <div class="cta-container">
      <a href="projects/index.html" class="cta-button">Voir mes projets</a>
      <a href="contact/index.html" class="cta-button secondary">Me contacter</a>
    </div>
  </header>

  <!-- Script pour activer le menu mobile -->
  <script>
    const burger = document.querySelector('.burger');
    const navLinks = document.querySelector('.nav-links');

    if (burger && navLinks) {
      burger.addEventListener('click', () => {
        navLinks.classList.toggle('show');
        burger.classList.toggle('open');
      });

      const links = navLinks.querySelectorAll('a');
      links.forEach(link => {
        link.addEventListener('click', () => {
          navLinks.classList.remove('show');
          burger.classList.remove('open');
        });
      });
    }
  </script>

  <script src="script.js"></script>
</body>
</html>
