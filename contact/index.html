<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - Portfolio Cheikh</title>
  <link rel="stylesheet" href="../style.css">
  <!-- Import des icônes Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    footer {
      margin-top: 40px;
      padding: 20px;
      background: #f1f1f1;
      text-align: center;
      border-top: 1px solid #ddd;
    }

    footer h2 {
      font-size: 1.3em;
      margin-bottom: 15px;
      color: #333;
    }

    .social-icons {
      display: flex;
      justify-content: center;
      gap: 20px;
    }

    .social-icons a {
      text-decoration: none;
      color: #0078d7;
      font-size: 1.8em;
      transition: transform 0.3s ease, color 0.3s ease;
    }

    .social-icons a:hover {
      transform: scale(1.2);
      color: #005fa3;
    }
  </style>
</head>
<body id="contact-page">
  <!-- Menu de navigation -->
  <nav>
    <!-- Bouton hamburger pour mobile -->
    <div class="menu-toggle">
      <span></span>
      <span></span>
      <span></span>
    </div>

    <div class="nav-container">
      <ul class="nav-links">
        <li><a href="../index.html">Accueil</a></li>
        <li><a href="../about/index.html">À propos</a></li>
        <li><a href="../skills/index.html">Compétences</a></li>
        <li><a href="../projects/index.html">Projets</a></li>
        <li><a href="index.html" class="active">Contact</a></li>
      </ul>
    </div>
  </nav>

  <!-- Section Contact -->
  <main>
    <h1>Contactez-moi</h1>
    <p class="intro-text">
      <strong>Vous souhaitez collaborer ou en savoir plus sur mes projets ? Envoyez-moi un message.</strong>
    </p>

    <form class="contact-form" action="https://formspree.io/f/xzdjgaja" method="POST" onsubmit="showThankYou(event)">
      <label for="name">Nom</label>
      <input type="text" id="name" name="name" placeholder="Votre nom" required>

      <label for="email">Email</label>
      <input type="email" id="email" name="_replyto" placeholder="Votre email" required>

      <label for="message">Message</label>
      <textarea id="message" name="message" rows="6" placeholder="Votre message..." required></textarea>

      <button type="submit">Envoyer</button>
    </form>

    <p class="thank-you" id="thankYouMessage">✅ Merci, votre message a été envoyé avec succès !</p>
  </main>

  <!-- Footer avec icônes -->
  <footer>
    <h2>Retrouvez-moi sur</h2>
    <div class="social-icons">
      <a href="https://wa.me/221784383911" target="_blank"><i class="fab fa-whatsapp"></i></a>
      <a href="https://instagram.com/cheikh_maestro_" target="_blank"><i class="fab fa-instagram"></i></a>
      <a href="mailto:cheikhmaestro8@gmail.com" target="_blank"><i class="fas fa-envelope"></i></a>
    </div>
  </footer>

  <!-- Script pour activer le menu mobile -->
  <script src="../script.js"></script>

  <!-- Script pour afficher le message de remerciement -->
  <script>
    function showThankYou(event) {
      event.preventDefault();
      document.getElementById("thankYouMessage").style.display = "block";
    }
  </script>
  <link rel="stylesheet" href="../style.css">
<script src="../script.js"></script>

</body>
</html>
