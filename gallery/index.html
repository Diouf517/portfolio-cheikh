  <!-- Lightbox -->
  <div id="lightbox" class="lightbox">
    <span class="close">&times;</span>
    <span class="prev">&#10094;</span>
    <span class="next">&#10095;</span>
    <img class="lightbox-content" id="lightbox-img">
    <div id="caption"></div>
  </div>

  <!-- Script Lightbox -->
  <script>
    const galleryImages = document.querySelectorAll("#lightbox-gallery img");
    const lightbox = document.getElementById("lightbox");
    const lightboxImg = document.getElementById("lightbox-img");
    const caption = document.getElementById("caption");
    const closeBtn = document.querySelector(".close");
    const prevBtn = document.querySelector(".prev");
    const nextBtn = document.querySelector(".next");

    let currentIndex = 0;

    galleryImages.forEach((img, index) => {
      img.addEventListener("click", () => {
        currentIndex = index;
        lightbox.style.display = "block";
        lightbox.classList.add("show-image");
        lightboxImg.style.display = "block";
        prevBtn.style.display = "block";
        nextBtn.style.display = "block";
        lightboxImg.src = img.src;
        caption.innerHTML = img.alt;
      });
    });

    prevBtn.addEventListener("click", () => {
      currentIndex = (currentIndex - 1 + galleryImages.length) % galleryImages.length;
      lightboxImg.src = galleryImages[currentIndex].src;
      caption.innerHTML = galleryImages[currentIndex].alt;
    });

    nextBtn.addEventListener("click", () => {
      currentIndex = (currentIndex + 1) % galleryImages.length;
      lightboxImg.src = galleryImages[currentIndex].src;
      caption.innerHTML = galleryImages[currentIndex].alt;
    });

    closeBtn.addEventListener("click", () => {
      lightbox.style.display = "none";
      lightbox.classList.remove("show-image");
    });

    window.addEventListener("click", (e) => {
      if (e.target === lightbox) {
        lightbox.style.display = "none";
        lightbox.classList.remove("show-image");
      }
    });

    window.addEventListener("keydown", (e) => {
      if (e.key === "Escape") {
        lightbox.style.display = "none";
        lightbox.classList.remove("show-image");
      }
    });
  </script>

  <!-- Script pour activer le menu mobile -->
  <script src="../script.js"></script>

<script src="../script.js"></script>
